<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0B0D10;
  --bg-soft:#11141A;
  --surface:rgba(255,255,255,0.055);
  --surface-strong:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.10);
  --border-strong:rgba(255,255,255,0.18);
  --ink:#F5F3EF;
  --ink-dim:#9A9CA3;
  --ink-faint:#5C5F68;
  --accent:#D4A24C;
  --accent-soft:#E8C988;
  --accent-ink:#1A1306;
  --danger:#E8674F;
  --radius-lg:28px;
  --radius-md:18px;
  --radius-sm:12px;
  --shadow-soft:0 20px 60px -20px rgba(0,0,0,0.6);
  --shadow-pop:0 30px 80px -25px rgba(212,162,76,0.25);
  --ease:cubic-bezier(.16,1,.3,1);
  --font-display:"Fraunces", serif;
  --font-body:"Inter", -apple-system, system-ui, sans-serif;
  --font-mono:"JetBrains Mono", monospace;
}
[data-theme="light"]{
  --bg:#F3F1EC;
  --bg-soft:#FFFFFF;
  --surface:rgba(20,20,20,0.04);
  --surface-strong:rgba(20,20,20,0.07);
  --border:rgba(20,20,20,0.09);
  --border-strong:rgba(20,20,20,0.16);
  --ink:#16181C;
  --ink-dim:#5E6068;
  --ink-faint:#9A9CA3;
  --accent:#B9842E;
  --accent-ink:#FFFBF2;
  --shadow-soft:0 20px 60px -25px rgba(0,0,0,0.18);
  --shadow-pop:0 30px 80px -30px rgba(185,132,46,0.25);
}

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto;}
  *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
}

body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  transition:background .4s var(--ease), color .4s var(--ease);
}

img{max-width:100%; display:block;}
img.img-fallback{
  object-fit:cover; color:transparent; font-size:0;
  background:linear-gradient(135deg, var(--surface-strong), var(--surface));
}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}

::selection{background:var(--accent); color:var(--accent-ink);}

:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:3px;
  border-radius:6px;
}

.wrap{
  max-width:560px;
  margin:0 auto;
  position:relative;
  min-height:100vh;
}

/* ---------- Skip link ---------- */
.skip-link{
  position:absolute; left:-999px; top:0;
  background:var(--accent); color:var(--accent-ink);
  padding:10px 16px; border-radius:8px; z-index:999; font-weight:600;
}
.skip-link:focus{ left:12px; top:12px; }

/* ---------- Top bar (theme + share) ---------- */
.topbar{
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:center;
  z-index:60;
  pointer-events:none;
}
.topbar-inner{
  width:100%; max-width:560px;
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 18px;
  pointer-events:none;
}
.topbar-btn{
  pointer-events:auto;
  width:42px; height:42px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:rgba(15,16,19,0.45);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  border:1px solid rgba(255,255,255,0.14);
  color:#F5F3EF;
  transition:transform .25s var(--ease), background .25s var(--ease);
}
[data-theme="light"] .topbar-btn{
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(20,20,20,0.1);
  color:#16181C;
}
.topbar-btn:active{ transform:scale(0.92); }
.topbar-btn svg{ width:19px; height:19px; }

/* ================= HERO ================= */
.hero{
  position:relative;
  padding-bottom:28px;
}
.cover{
  position:relative;
  height:34vh;
  min-height:230px;
  max-height:320px;
  overflow:hidden;
  background:var(--bg-soft);
}
.cover img{
  width:100%; height:100%; object-fit:cover;
  transform:scale(1.04);
  filter:saturate(1.05);
}
.cover::after{
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(11,13,16,0) 0%, rgba(11,13,16,0.15) 55%, var(--bg) 100%);
}
[data-theme="light"] .cover::after{
  background:linear-gradient(180deg, rgba(243,241,236,0) 0%, rgba(243,241,236,0.2) 55%, var(--bg) 100%);
}

.identity{
  position:relative;
  padding:0 24px;
  margin-top:-64px;
  text-align:center;
}
.avatar-shell{
  position:relative;
  width:128px; height:128px;
  margin:0 auto 18px;
}
.avatar-ring{
  position:absolute; inset:-3px;
  border-radius:50%;
  background:conic-gradient(from 0deg, var(--accent), transparent 35%, transparent 65%, var(--accent));
  animation:spin 7s linear infinite;
  opacity:0.9;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
.avatar{
  position:relative;
  width:128px; height:128px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid var(--bg);
  box-shadow:var(--shadow-soft);
  background:var(--bg-soft);
}
.avatar img{ width:100%; height:100%; object-fit:cover; }
.verified-badge{
  position:absolute;
  bottom:2px; right:2px;
  width:32px; height:32px;
  border-radius:50%;
  background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  border:3px solid var(--bg);
  color:var(--accent-ink);
}
.verified-badge svg{ width:15px; height:15px; }

.name{
  font-family:var(--font-display);
  font-weight:600;
  font-size:clamp(1.7rem, 7vw, 2.1rem);
  letter-spacing:-0.01em;
  margin-bottom:6px;
}
.role{
  color:var(--ink-dim);
  font-size:0.98rem;
  font-weight:500;
  margin-bottom:3px;
}
.role .company{ color:var(--ink); font-weight:600; }
.location{
  display:inline-flex; align-items:center; gap:5px;
  color:var(--ink-faint);
  font-size:0.85rem;
  margin-top:8px;
  font-family:var(--font-mono);
  letter-spacing:0.01em;
}
.location svg{ width:13px; height:13px; }

.save-cta{
  margin:22px auto 0;
  display:flex;
  width:calc(100% - 0px);
  max-width:340px;
}
.btn-save{
  flex:1;
  display:flex; align-items:center; justify-content:center; gap:9px;
  background:var(--accent);
  color:var(--accent-ink);
  font-weight:700;
  font-size:0.97rem;
  padding:15px 20px;
  border-radius:100px;
  box-shadow:var(--shadow-pop);
  transition:transform .2s var(--ease), box-shadow .2s var(--ease);
  letter-spacing:-0.01em;
}
.btn-save:active{ transform:scale(0.97); }
.btn-save svg{ width:18px; height:18px; }

/* ================= SECTION SHELL ================= */
section{ padding:30px 20px; position:relative; }
.section-head{
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:16px;
  padding:0 4px;
}
.section-title{
  font-family:var(--font-display);
  font-size:1.3rem;
  font-weight:600;
  letter-spacing:-0.01em;
}
.section-eyebrow{
  font-family:var(--font-mono);
  font-size:0.7rem;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--accent);
  font-weight:500;
}

.reveal{
  opacity:0;
  transform:translateY(18px);
  transition:opacity .7s var(--ease), transform .7s var(--ease);
}
.reveal.is-visible{ opacity:1; transform:translateY(0); }

/* ================= QUICK ACTIONS ================= */
.actions-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  padding:0 16px;
}
.action-btn{
  display:flex; flex-direction:column; align-items:center; gap:8px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:16px 8px 13px;
  transition:transform .22s var(--ease), background .22s var(--ease), border-color .22s var(--ease);
}
.action-btn:active{ transform:scale(0.95); background:var(--surface-strong); }
.action-icon{
  width:42px; height:42px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface-strong);
  color:var(--accent);
}
.action-icon svg{ width:19px; height:19px; }
.action-label{
  font-size:0.74rem;
  font-weight:600;
  color:var(--ink-dim);
  text-align:center;
  letter-spacing:-0.01em;
}

/* ================= GLASS CARD ================= */
.glass-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  box-shadow:var(--shadow-soft);
  padding:24px;
}

/* ================= ABOUT ================= */
.about-text{
  color:var(--ink-dim);
  font-size:0.96rem;
  line-height:1.7;
}
.about-text strong{ color:var(--ink); font-weight:600; }
.about-text p + p{ margin-top:12px; }
.about-list{
  margin-top:16px;
  display:flex; flex-direction:column; gap:10px;
}
.about-list-item{
  display:flex; align-items:flex-start; gap:10px;
  font-size:0.92rem;
  color:var(--ink-dim);
}
.about-list-item svg{ width:16px; height:16px; flex-shrink:0; margin-top:2px; color:var(--accent); }
.about-list-item b{ color:var(--ink); font-weight:600; }

/* ================= SOCIAL GRID ================= */
.social-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
}
.social-card{
  display:flex; align-items:center; gap:12px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px;
  transition:transform .22s var(--ease), border-color .22s var(--ease);
}
.social-card:active{ transform:scale(0.96); }
.social-icon{
  width:38px; height:38px;
  border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  color:#fff;
}
.social-icon svg{ width:19px; height:19px; }
.social-meta{ overflow:hidden; }
.social-name{ font-size:0.88rem; font-weight:600; }
.social-handle{ font-size:0.74rem; color:var(--ink-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ================= GALLERY ================= */
.gallery-scroll{
  display:flex;
  gap:12px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding:2px 20px 14px;
  margin:0 -20px;
  -ms-overflow-style:none;
  scrollbar-width:none;
}
.gallery-scroll::-webkit-scrollbar{ display:none; }
.gallery-item{
  scroll-snap-align:start;
  flex:0 0 72%;
  border-radius:var(--radius-md);
  overflow:hidden;
  position:relative;
  aspect-ratio:4/5;
  background:var(--bg-soft);
  border:1px solid var(--border);
}
.gallery-item img{
  width:100%; height:100%; object-fit:cover;
  transition:transform .5s var(--ease);
}
.gallery-caption{
  position:absolute; left:0; right:0; bottom:0;
  padding:16px 14px;
  background:linear-gradient(180deg, transparent, rgba(0,0,0,0.65));
  color:#fff;
}
.gallery-caption .cap-title{ font-size:0.88rem; font-weight:600; }
.gallery-caption .cap-tag{ font-size:0.72rem; opacity:0.75; font-family:var(--font-mono); }
.gallery-dots{ display:flex; gap:6px; justify-content:center; margin-top:10px; }
.gallery-dot{ width:5px; height:5px; border-radius:50%; background:var(--border-strong); transition:background .2s, width .2s; }
.gallery-dot.active{ background:var(--accent); width:16px; border-radius:3px; }

/* ================= INFO CARDS ================= */
.info-list{ display:flex; flex-direction:column; gap:8px; }
.info-row{
  display:flex; align-items:center; gap:14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  padding:14px 16px;
  transition:transform .2s var(--ease), background .2s var(--ease);
}
.info-row:active{ transform:scale(0.98); }
.info-icon{
  width:36px; height:36px; border-radius:10px;
  background:var(--surface-strong);
  display:flex; align-items:center; justify-content:center;
  color:var(--accent); flex-shrink:0;
}
.info-icon svg{ width:16px; height:16px; }
.info-text{ flex:1; min-width:0; }
.info-label{ font-size:0.7rem; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.08em; font-family:var(--font-mono); }
.info-value{ font-size:0.9rem; font-weight:600; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.info-chevron{ color:var(--ink-faint); flex-shrink:0; }
.info-chevron svg{ width:15px; height:15px; }

/* ================= QR / SHARE ================= */
.qr-card{
  display:flex; align-items:center; gap:18px;
}
.qr-box{
  width:96px; height:96px;
  background:#fff;
  border-radius:14px;
  padding:8px;
  flex-shrink:0;
}
.qr-box canvas, .qr-box svg{ width:100%; height:100%; }
.qr-info{ flex:1; }
.qr-info h3{ font-family:var(--font-display); font-size:1.05rem; font-weight:600; margin-bottom:4px; }
.qr-info p{ font-size:0.82rem; color:var(--ink-dim); line-height:1.5; }
.qr-actions{ display:flex; gap:8px; margin-top:12px; }
.chip-btn{
  display:inline-flex; align-items:center; gap:6px;
  font-size:0.78rem; font-weight:600;
  padding:8px 14px;
  border-radius:100px;
  background:var(--surface-strong);
  border:1px solid var(--border);
}
.chip-btn svg{ width:13px; height:13px; }
.chip-btn:active{ transform:scale(0.95); }

/* ================= FOOTER ================= */
footer{
  padding:36px 24px 110px;
  text-align:center;
}
.footer-brand{
  font-family:var(--font-mono);
  font-size:0.72rem;
  color:var(--ink-faint);
  letter-spacing:0.04em;
}
.necsaria-plate{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-top:18px;
  height:118px;
  border-radius:var(--radius-md);
  overflow:hidden;
  background:#0B0D10;
  border:1px solid var(--border);
  color:#6B6E76;
  isolation:isolate;
}
[data-theme="light"] .necsaria-plate{ background:#15171B; border-color:rgba(255,255,255,0.08); }
.necsaria-motif{
  position:absolute; inset:0;
  width:100%; height:100%;
  z-index:0;
}
.necsaria-logo{
  position:relative;
  z-index:1;
  display:flex; flex-direction:column; align-items:center;
  gap:5px;
}
.necsaria-logo-text{
  font-family:var(--font-body);
  font-weight:800;
  font-size:1.55rem;
  letter-spacing:0.01em;
}
.necsaria-logo-text .dim{ color:#D8D9DB; }
.necsaria-logo-text .dimmer{ color:#8A8C92; }
.necsaria-logo-sub{
  font-family:var(--font-mono);
  font-size:0.6rem;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:#8A8C92;
  font-weight:500;
}

/* ================= BACK TO TOP ================= */
.back-top{
  position:fixed;
  right:18px; bottom:18px;
  width:46px; height:46px;
  border-radius:50%;
  background:var(--accent);
  color:var(--accent-ink);
  display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-pop);
  z-index:50;
  opacity:0; transform:translateY(12px) scale(0.85);
  pointer-events:none;
  transition:opacity .3s var(--ease), transform .3s var(--ease);
}
.back-top.show{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
.back-top svg{ width:18px; height:18px; }

/* ================= TOAST ================= */
.toast-stack{
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%);
  display:flex; flex-direction:column; gap:8px;
  z-index:200;
  width:calc(100% - 40px);
  max-width:400px;
  align-items:center;
}
.toast{
  background:#1B1D22;
  color:#F5F3EF;
  border:1px solid rgba(255,255,255,0.12);
  padding:13px 18px;
  border-radius:14px;
  font-size:0.85rem;
  font-weight:500;
  display:flex; align-items:center; gap:10px;
  box-shadow:0 15px 40px -10px rgba(0,0,0,0.5);
  opacity:0; transform:translateY(10px) scale(0.96);
  animation:toast-in .35s var(--ease) forwards;
}
.toast.out{ animation:toast-out .25s var(--ease) forwards; }
@keyframes toast-in{ to{ opacity:1; transform:translateY(0) scale(1); } }
@keyframes toast-out{ to{ opacity:0; transform:translateY(8px) scale(0.96); } }
.toast svg{ width:16px; height:16px; color:var(--accent); flex-shrink:0; }

/* ================= SKELETON / LAZY ================= */
.skeleton{
  background:linear-gradient(110deg, var(--surface) 8%, var(--surface-strong) 18%, var(--surface) 33%);
  background-size:200% 100%;
  animation:shimmer 1.4s linear infinite;
}
@keyframes shimmer{ to{ background-position-x:-200%; } }
img.lazy{ opacity:0; transition:opacity .5s var(--ease); }
img.lazy.loaded{ opacity:1; }

/* ================= MISC ================= */
.hidden{ display:none !important; }
.sr-only{
  position:absolute; width:1px; height:1px;
  overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap;
}

@media (min-width:540px){
  .wrap{ box-shadow:0 0 0 1px var(--border); }
}
</style>
</head>
<body>
<a href="#main" class="skip-link">Aller au contenu principal</a>

<div class="topbar" aria-hidden="false">
  <div class="topbar-inner">
    <button class="topbar-btn" id="themeToggle" aria-label="Changer de thème" title="Thème clair / sombre">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="topbar-btn" id="shareBtn" aria-label="Partager ce profil" title="Partager">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
  </div>
</div>

<div class="wrap" id="main">

  <!-- ===================== 1. HERO ===================== -->
  <header class="hero">
    <div class="cover">
      <img id="coverImg" src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1200&q=80&auto=format&fit=crop" alt="Photo de couverture">
    </div>
    <div class="identity">
      <div class="avatar-shell">
        <div class="avatar-ring" aria-hidden="true"></div>
        <div class="avatar">
          <img id="avatarImg" src="" alt="Photo de profil">
